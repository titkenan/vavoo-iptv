name: Update M3U Playlist

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'  # Günde 4 kez
  workflow_dispatch:  # Manuel çalıştırma butonu
  push:
    branches:
      - main
    paths:
      - 'vavoo_resolver.py'

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Update M3U
        run: python vavoo_resolver.py
      
      - name: Add Proxy
        run: python add_proxy.py
      
      - name: Commit changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add vavoo_turkiye.m3u vavoo_epg.xml vavoo_turkiye_proxy.m3u
          git diff --quiet || git commit -m "🤖 Auto-update $(date -u +'%Y-%m-%d %H:%M')"
          git push
