name: Update M3U Playlist

on:
  schedule:schedule:
 schedule:
  - cron: '0 */2 * * *'  # Her 2 saatte bir (günde 12 kez)
  workflow_dispatch:

permissions:
  contents: write  # ← BU EKLENDİ! Write permission gerekli

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
    - uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}  # ← BU EKLENDİ!
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install requests
    
    - name: Generate M3U
      run: python generate_m3u.py
    
    - name: Commit and push
      run: |
        git config user.name 'GitHub Action'
        git config user.email 'action@github.com'
        git add -f vavoo_turkiye.m3u vavoo_epg.xml
        
        # Dosyalar var mı kontrol et
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Auto-update M3U - $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git push https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
        fi
