name: Daily Vavoo Update

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: pip install requests
    
    - name: List files  # Debug için dosyaları listele
      run: |
        echo "Current directory:"
        pwd
        echo "Files:"
        ls -la
    
    - name: Update Vavoo Gist
      env:
        GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
      run: |
        echo "Starting update..."
        python vavoo_resolver.py --auto
    
    - name: Check status
      if: failure()
      run: |
        echo "Update failed!"
        ls -la
