name: Daily Vavoo Update

on:
  schedule:
    # Her gün 03:00 UTC (Türkiye 06:00)
    - cron: '0 3 * * *'
  
  # Manuel çalıştırma için
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
    
    - name: Update Vavoo Gist
      env:
        GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "Starting update..."
        python vavoo_resolver.py --auto
        echo "Update completed!"
    
    - name: Check status
      if: failure()
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: 'Vavoo Update Failed - ' + new Date().toISOString(),
            body: 'Automatic update failed. Please check logs.'
          });
