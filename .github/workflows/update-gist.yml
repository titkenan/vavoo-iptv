name: Daily Vavoo Update

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: pip install requests
    
    - name: Debug Token
      run: |
        echo "Secret exists: ${{ secrets.GIST_TOKEN != '' }}"
        echo "Secret length: ${{ secrets.GIST_TOKEN != '' && 'YES' || 'NO' }}"
    
    - name: Update Vavoo Gist
      env:
        GIST_TOKEN: ${{ secrets.GIST_TOKEN }}  # BU SATIR ÖNEMLİ!
      run: |
        echo "GIST_TOKEN is set: ${GIST_TOKEN:+YES}"
        python vavoo_resolver.py --auto
