name: Daily Vavoo Update

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: pip install requests
    
    - name: Update Vavoo Gist
      env:
        # GITHUB_TOKEN DEĞİL! Kendi PAT token'ınız:
        GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
      run: |
        echo "Token check: ${GIST_TOKEN:+SET}"
        python vavoo_resolver.py --auto
