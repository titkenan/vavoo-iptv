name: Vavoo IPTV Updater

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: pip install requests
    
    - name: Run Vavoo Resolver
      env:
        GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
      run: python vavoo_resolver.py --auto
    
    # Artifact kaldırıldı - Gist'e zaten yazıyor
