name: Vavoo IPTV Updater

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - run: pip install requests
    
    - name: Update Vavoo Playlist
      env:
        GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
      run: python vavoo_resolver.py --auto
    
    - name: Check results
      run: |
        echo "Playlist güncellendi"
        ls -la vavoo_turkiye.m3u || echo "Dosya oluşturulamadı"
